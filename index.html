<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Business card</title>
  <meta name="description" content="Digital business card" />

  <meta name="theme-color" content="#250b60" />

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="./assets/icons/icon.svg" />
  <link rel="icon" type="image/png" href="./assets/icons/icon-512.png" />
  <link rel="apple-touch-icon" href="./assets/icons/icon-512.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Business card" />

  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body>
  <main class="card">
    <section class="photo">
      <img id="card-photo" class="photo-img" alt="" hidden />
      <div id="photo-placeholder" class="photo-placeholder"></div>
      <svg class="photo-wave" viewBox="0 0 360 91" preserveAspectRatio="none" aria-hidden="true">
        <path d="M170.84 32.4365C112.559 51.308 37.5 49.4563 0 32.4365V90.4563H360V10.9644C307.5 -16.0437 231 12.9562 170.84 32.4365Z" fill="currentColor"/>
      </svg>
      <button id="btn-open-qr" class="icon-tile-btn" type="button" aria-label="Show QR code"></button>
    </section>

    <div class="content">
      <p id="incomplete-hint" class="hint" hidden>Fill in your details via "Edit details" below.</p>

      <h1 id="card-name" class="name">—</h1>
      <p id="card-phonetic" class="phonetic" hidden></p>

      <ul id="card-fields" class="fields"></ul>

      <div class="card-actions">
        <button id="btn-edit" class="btn btn--ghost-outline" type="button">Edit details</button>
        <button id="btn-install" class="btn btn--ghost-outline" type="button" hidden>Install app</button>
      </div>
    </div>
  </main>

  <dialog id="qr-dialog" class="dialog dialog--qr">
    <h2>Scannez pour ajouter</h2>
    <div id="qr-code" class="qr-code"></div>
    <button id="btn-close-qr" class="btn btn--secondary" type="button">Fermer</button>
  </dialog>

  <dialog id="edit-dialog" class="dialog dialog--full">
    <form id="edit-form" method="dialog" class="edit-form">
      <header class="edit-header">
        <h2>Edit details</h2>
        <button type="button" id="btn-cancel-edit" class="icon-btn" aria-label="Close">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6 6 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
      </header>

      <div class="edit-body">
        <section class="edit-section">
          <h3>Photo</h3>
          <input type="file" id="photo-input" accept="image/*" hidden />

          <div id="photo-crop-wrap" class="photo-crop-wrap" hidden>
            <p class="hint">Tap the photo to choose which part is cropped to a square.</p>
            <div id="photo-crop-viewport" class="photo-crop-viewport">
              <img id="photo-crop-img" alt="" />
              <div id="crop-frame" class="crop-frame" hidden></div>
            </div>
            <div class="row">
              <button type="button" id="btn-use-photo" class="btn btn--primary">Use photo</button>
              <button type="button" id="btn-cancel-photo" class="btn btn--ghost">Cancel</button>
            </div>
          </div>

          <div id="photo-preview-wrap" class="photo-preview-wrap">
            <img id="photo-preview" class="photo-preview" alt="" hidden />
            <div class="row">
              <button type="button" id="btn-choose-photo" class="btn btn--secondary">Choose photo</button>
              <button type="button" id="btn-remove-photo" class="btn btn--ghost" hidden>Remove</button>
            </div>
          </div>

          <label class="checkbox-row">
            <input type="checkbox" name="hidePhoto" />
            <span>Hide photo (card starts at your name)</span>
          </label>
        </section>

        <section class="edit-section">
          <h3>Name</h3>
          <label>First name
            <input type="text" name="firstName" required />
          </label>
          <label>Last name
            <input type="text" name="lastName" required />
          </label>
          <label>Pronunciation <span class="optional">(optional)</span>
            <input type="text" name="phonetic" placeholder="[ Chourde Kou-lee-weïne ]" />
          </label>
        </section>

        <section class="edit-section">
          <h3>Background color</h3>
          <div id="color-swatches" class="color-swatches"></div>
          <div class="color-hex-row">
            <span id="color-preview" class="color-preview" aria-hidden="true"></span>
            <input type="text" name="accentColorHex" class="color-hex-input" placeholder="#250b60" maxlength="7" autocapitalize="off" autocorrect="off" spellcheck="false" inputmode="text" />
          </div>
        </section>

        <section class="edit-section">
          <div class="edit-section-header">
            <h3>Fields</h3>
            <button type="button" id="btn-add-field" class="btn btn--ghost btn--small">+ Add field</button>
          </div>
          <ul id="field-editor-list" class="field-editor-list"></ul>
        </section>
      </div>

      <div class="dialog-actions">
        <button type="submit" class="btn btn--primary">Save</button>
      </div>
    </form>
  </dialog>

  <script src="./assets/qrcode.min.js"></script>
  <script type="module" src="./assets/app.js"></script>
</body>
</html>
