<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Program NFC tag</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./assets/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="./assets/icons/icon-192.png" />
  <link rel="stylesheet" href="./assets/styles.css" />
  <style>
    .nfc-main {
      max-width: 30rem;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 1.5rem;
      padding: 2rem 1.75rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      text-align: center;
    }
    .nfc-status { font-size: 1.1rem; min-height: 1.5rem; }
    .nfc-status--error { color: var(--danger); }
    .back-link { font-size: 0.9rem; color: var(--text-muted); text-decoration: underline; }
  </style>
</head>
<body>
  <main class="nfc-main">
    <h1>Program NFC tag</h1>
    <p>
      Write your contact details once to a physical NFC tag (e.g. an
      NTAG213 sticker). After that no one needs to open this app: tapping a
      phone against the tag shows an "add contact" prompt directly, on both
      Android and iPhone.
    </p>
    <p id="nfc-status" class="nfc-status">Ready to write.</p>
    <button id="btn-write" class="btn btn--primary" type="button">Write tag</button>
    <a class="back-link" href="./index.html">← Back to card</a>
  </main>

  <script type="module" src="./assets/nfc.js"></script>
</body>
</html>
